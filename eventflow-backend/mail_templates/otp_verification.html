  ===========================================================================
  
  EmailJS Template Settings:
    - To Email:  {{to_email}}
    - Subject:   {{subject}}
    - Content:   Paste everything below this comment block
-->

<div style="font-family: system-ui, -apple-system, sans-serif, Arial; font-size: 14px; max-width: 520px; margin: 0 auto; background: #0c0d0f; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08)">

  <!-- Header -->
  <div style="background: linear-gradient(135deg, #b8924e, #966a1e); padding: 28px 36px">
    <a style="text-decoration: none; outline: none" href="https://eventflow.vercel.app" target="_blank">
      <span style="font-size: 26px; letter-spacing: 0.08em; color: #fff; font-weight: 900; font-family: system-ui, sans-serif">Event<span style="color: #0c0d0f">Flow</span></span>
    </a>
  </div>

  <!-- Body -->
  <div style="padding: 36px">
    <h2 style="margin: 0 0 10px; font-size: 20px; color: #ffffff">{{title}}</h2>
    <p style="color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.7; margin: 0 0 28px">
      {{description}}
    </p>

    <!-- CTA Button -->
    <a href="{{link}}"
       style="display: inline-block; padding: 14px 32px; background: #b8924e; color: #0c0d0f;
              font-weight: 700; font-size: 15px; border-radius: 8px; text-decoration: none;
              letter-spacing: 0.04em">
      {{button_text}}
    </a>

    <p style="color: rgba(255,255,255,0.3); font-size: 12px; margin-top: 28px; line-height: 1.6">
      If you didn't make this request, you can safely ignore this email.<br/>
      EventFlow will never ask for your login codes or links. Beware of phishing scams.
    </p>
  </div>

  <!-- Footer -->
  <div style="background: #141518; padding: 18px 36px; border-top: 1px solid rgba(255,255,255,0.06)">
    <p style="margin: 0; color: rgba(255,255,255,0.2); font-size: 11px">
      &copy; 2025 EventFlow &mdash; Tushar Maurya &mdash; B.Tech IT Project
    </p>
  </div>

</div>
